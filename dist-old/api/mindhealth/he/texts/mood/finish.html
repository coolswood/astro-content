<h2>הערכה חוזרת של ההרגשה</h2><p>כבר ביצעתם את ההערכה הראשונה. עכשיו נסו בעדינות לתמוך בעצמכם ולשפר את ההרגשה.</p><p>אפשר להשתמש בכלים שבאפליקציה או לקבוע פגישה עם פסיכולוג/ית — בחרו את מה שנוח ומתאים לכם.</p><p>כשתסיימו, חזרו לכאן והעריכו שוב את מצבכם.</p><p>מומלץ לבצע הערכה חוזרת במהלך היום כדי לראות את השינוי.</p>
