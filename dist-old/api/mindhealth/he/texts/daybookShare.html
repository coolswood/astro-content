<h2>שתפו את המחשבות שלכם עם אחרים</h2><p>שתפו רעיונות וקבלו תמיכה חמה ממשתמשים אחרים.</p><p>ספרו את הסיפור שלכם, הציעו נושא למחשבה או שתפו במה שמעסיק את הלב והמחשבות שלכם עכשיו. החוויה שלכם יכולה לתמוך במישהו/י ברגע קשה, או פשוט לתת תחושת חיבור.</p><p>כל הרשומות אנונימיות. אם תרצו, תמיד תוכלו להסתיר או למחוק אותן.</p>
