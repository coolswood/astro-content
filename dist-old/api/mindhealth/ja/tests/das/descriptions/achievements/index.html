<p>マイナスの結果は、自分を「労働市場に出される商品」のように感じ、仕事の成果に強く依存している状態を示します。数値が低いほど、喜びや幸福感が職業上の達成に左右されやすくなります。</p> <p>そうした人は、仕事を残したまま休暇を取ったり、退職したり、病気で働けなくなったりすると、感情が大きく揺さぶられ、気分の急激な落ち込みに陥りやすくなります。収入面の悪化も、心のショックも、同じくらい耐えがたいものとして感じられることが多いです。</p> <p>一方、プラスの結果は、仕事にやりがいと満足を感じながらも、それだけが自尊心や幸福の源ではないという、バランスの取れたスタンスを示します.</p>
